plugins {
    id 'java'
    id 'org.springframework.boot' version '3.2.4'
    id 'io.spring.dependency-management' version '1.1.4'
    id "com.thinkimi.gradle.MybatisGenerator" version "2.4"
    id "org.openapi.generator" version "7.2.0"
}

group = 'ti.api'
version = '0.0.1-SNAPSHOT'

java {
    sourceCompatibility = '21'
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
    mavenLocal()
// 他のリポジトリを参照する場合、以下を追加
//    maven {
//        urlの値はリポジトリと
//        url = uri("https://maven.pkg.github.com/XXX/XXX")
//        credentials {
//            username = project.findProperty("github.user")
//            password = project.findProperty("github.key")
//        }
//    }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-jdbc'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.openapitools:jackson-databind-nullable:0.1.0'
    implementation 'org.mybatis.spring.boot:mybatis-spring-boot-starter:2.2.2'
    implementation 'org.mybatis.generator:mybatis-generator-core:1.4.1'
    implementation 'mysql:mysql-connector-java:8.0.26'
    compileOnly 'org.projectlombok:lombok'
    compileOnly 'io.swagger.core.v3:swagger-annotations:2.2.8'
    annotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.openApiGenerate {
    def name = System.getenv('YAML')
    def gen = System.getenv('GEN')
    generatorName = ""

    switch (gen) {
        case "spring":
            generatorName = "spring"
            configFile = "$rootDir/oas/config.json".toString()
            inputSpec = "$rootDir/oas/api/${name}.yml".toString()
            outputDir = "$rootDir/src/main/restapi".toString()
            apiPackage = "ti.api.portfolioapi.restapi.${name}"
            modelPackage = "ti.api.portfolioapi.restapi.${name}.model"

            generateApiTests = false
            generateModelTests = false

            generateModelDocumentation = false
            generateApiDocumentation = false

            globalProperties = [
                    modelDocs: 'false'
            ]
            break;
        case "ts":
            packageName = "front.restapi.${name}"
            generatorName = "typescript"
            inputSpec = "$rootDir/oas/api/${name}.yml".toString()
            outputDir = "$rootDir/ts".toString()
            apiPackage = packageName
            modelPackage = packageName + ".model"
            break;
        default:
            if (gen != null) {
                throw new GradleScriptException("invalidGeneratorName:" + gen)
            }
            break;
    }
}

mybatisGenerator {
    verbose = true
    def driverClass = "com.mysql.cj.jdbc.Driver"
    def driverFile = "$rootDir/tool/mysql-connector-j-8.4.0.jar"
    def port = 8000
    def connectionUrl = "jdbc:mysql://localhost:$port/ti_db"
    def userId = "user_name"
    def password = "user_password"
    def targetProject = "$rootDir/src/main/java/"

    // 設定ファイル情報
    configFile = "$rootDir/src/main/resources/generatorConfig.xml"
    mybatisProperties = [
            'driverFile'   : driverFile,
            'driverClass'  : driverClass,
            'connectionUrl': connectionUrl,
            'userId'       : userId,
            'password'     : password,
            'targetProject': targetProject
    ]

    dependencies {
        mybatisGenerator 'com.itfsw:mybatis-generator-plugin:1.3.7'
        mybatisGenerator 'org.mybatis.generator:mybatis-generator-core:1.3.7'
    }
}


// デフォルトの規約に沿わないディレクトリ構成を取るため設定変更
sourceSets {
    main {
        java {
            srcDirs = [
                    "$rootDir/src/main/java",
                    "$rootDir/src/main/restapi"
            ]
        }
    }
}

